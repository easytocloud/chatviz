name: Release
on:
  push:
    branches:
      - main

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/chatviz
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "lts/*"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build hatchling

      - name: Install semantic-release
        run: |
          npm install -g semantic-release @semantic-release/changelog @semantic-release/git

      - name: Get Version
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          output=$(npx semantic-release --dry-run 2>&1)
          echo "Semantic Release Output:"
          echo "$output"

          if echo "$output" | grep -q "Published release"; then
            version=$(echo "$output" | grep -oP 'Published release \K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            echo "new_release_version=$version" >> $GITHUB_OUTPUT
          elif echo "$output" | grep -q "next release version is"; then
            version=$(echo "$output" | grep -oP 'next release version is \K[0-9]+\.[0-9]+\.[0-9]+')
            echo "new_release_version=$version" >> $GITHUB_OUTPUT
          else
            echo "No new version to be released"
            exit 0
          fi

      - name: Create Release
        if: steps.semantic.outputs.new_release_version != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Update version in pyproject.toml
        if: steps.semantic.outputs.new_release_version != ''
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.semantic.outputs.new_release_version }}\"/" pyproject.toml
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"
          git add pyproject.toml
          git commit -m "chore: update version to ${{ steps.semantic.outputs.new_release_version }} [skip ci]"
          git push

      - name: Build package
        if: steps.semantic.outputs.new_release_version != ''
        run: python -m build

      - name: Publish to PyPI
        if: steps.semantic.outputs.new_release_version != ''
        uses: pypa/gh-action-pypi-publish@release/v1
